name: Docker Project CI

on:
  push:
    paths:
      - 'Project-1-Web-Server-Docker/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker Image
      run: |
        cd Project-1-Web-Server-Docker
        docker build -t deepshikhadubey/my-web-server .
        docker push deepshikhadubey/my-web-server
