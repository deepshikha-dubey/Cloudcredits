name: Docker CI/CD

on:
  push:
    branches: 
      - 'Project-5-Building-VCS/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
         cd Project-5-Building-VCS
         docker build -t ${{ secrets.DOCKER_USERNAME }}/myvcs-app:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/myvcs-app:latest
