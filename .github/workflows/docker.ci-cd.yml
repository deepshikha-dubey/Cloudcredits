name: Docker Project CI

on:
  push:
    paths:
      - 'Project-1-Web-Server-Docker/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        cd Project-1-Web-Server-Docker
        docker build -t my-web-server .
