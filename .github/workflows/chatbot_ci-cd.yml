name: Chatbot CI CD

on:
  push:
    paths:
      - 'Project-3-Creating-Chatbot/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          cd Project-3-Creating-Chatbot
          docker build -t chatbot-app .
